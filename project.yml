name: tinyOBS
options:
  bundleIdPrefix: com.tinyobs
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: tinyOBS
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    INFOPLIST_FILE: tinyOBS/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.tinyobs.app

targets:
  tinyOBS:
    type: application
    platform: macOS
    sources:
      - path: tinyOBS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: tinyOBS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: tinyOBS/Resources/tinyOBS.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyobs.app
    entitlements:
      path: tinyOBS/Resources/tinyOBS.entitlements
      properties:
        com.apple.security.device.camera: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.microphone: true
