name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. 根据 commit message 计算下一个版本号 ──
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|.*!:)"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "New version: v${NEW_VERSION}"

  # ── 2. macOS 构建 ──
  build-macos:
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.9'

      - name: Build
        run: swift build -c release

      - name: Create App Bundle
        run: |
          APP_PATH="tinyOBS.app"
          CONTENTS="$APP_PATH/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          mkdir -p "$MACOS"
          mkdir -p "$RESOURCES"

          cp .build/release/tinyOBS "$MACOS/"

          # Update version in Info.plist
          sed -i '' "s/1\.0/${{ needs.version.outputs.version }}/g" tinyOBS/Resources/Info.plist
          cp tinyOBS/Resources/Info.plist "$CONTENTS/"

          echo -n "APPL????" > "$CONTENTS/PkgInfo"

          chmod +x "$MACOS/tinyOBS"

      - name: Codesign
        run: codesign --force --deep --sign - tinyOBS.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: tinyOBS.app

  # ── 3. DMG 打包 ──
  package-dmg:
    needs: [version, build-macos]
    runs-on: macos-14
    steps:
      - name: Download .app artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: tinyOBS.app

      - name: Fix executable permissions
        run: chmod +x tinyOBS.app/Contents/MacOS/tinyOBS

      - name: Create DMG with Applications link
        run: |
          ln -s /Applications tinyOBS.app/../Applications
          hdiutil create -volname tinyOBS -srcfolder . -ov -format UDZO \
            tinyOBS-${{ needs.version.outputs.version }}-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  # ── 4. 创建 Release ──
  release:
    needs: [version, package-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            NOTES=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s (%h)")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${{ needs.version.outputs.tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: artifacts/*.dmg
