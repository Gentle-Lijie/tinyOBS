name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.9'

      - name: Build
        run: swift build -c release

      - name: Create App Bundle
        run: |
          APP_PATH="tinyOBS.app"
          CONTENTS="$APP_PATH/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          mkdir -p "$MACOS"
          mkdir -p "$RESOURCES"

          # Copy executable
          cp .build/release/tinyOBS "$MACOS/"

          # Copy Info.plist
          cp tinyOBS/Resources/Info.plist "$CONTENTS/"

          # Create PkgInfo
          echo -n "APPL????" > "$CONTENTS/PkgInfo"

          # Set permissions
          chmod +x "$MACOS/tinyOBS"

      - name: Codesign
        run: |
          codesign --force --deep --sign - tinyOBS.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "tinyOBS" \
            --volicon "tinyOBS/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "tinyOBS.app" 150 190 \
            --hide-extension "tinyOBS.app" \
            --app-drop-link 450 190 \
            "tinyOBS.dmg" \
            "tinyOBS.app" || create-dmg \
            --volname "tinyOBS" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "tinyOBS.app" 150 190 \
            --hide-extension "tinyOBS.app" \
            --app-drop-link 450 190 \
            "tinyOBS.dmg" \
            "tinyOBS.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyOBS
          path: tinyOBS.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: tinyOBS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: tinyOBS.dmg
          generate_release_notes: true
